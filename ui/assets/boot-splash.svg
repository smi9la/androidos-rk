<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>

  <!-- Glow Effect -->
  <circle cx="640" cy="360" r="400" fill="url(#glowGradient)" opacity="0.6"/>

  <!-- Decorative Elements - Top Left -->
  <polygon points="100,50 150,100 100,150 50,100" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  <polygon points="100,50 150,100 100,150 50,100" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3" transform="translate(10, 10)"/>

  <!-- Decorative Elements - Bottom Right -->
  <polygon points="1180,670 1230,720 1180,770 1130,720" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.5"/>
  <polygon points="1180,670 1230,720 1180,770 1130,720" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.3" transform="translate(-10, -10)"/>

  <!-- Grid Pattern -->
  <g opacity="0.1" stroke="#00d4ff" stroke-width="1">
    <line x1="0" y1="0" x2="1280" y2="0"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="720" x2="1280" y2="720"/>
    <line x1="0" y1="0" x2="0" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="1280" y1="0" x2="1280" y2="720"/>
  </g>

  <!-- Main Logo Container -->
  <g filter="url(#glow)">
    <!-- Central Circle -->
    <circle cx="640" cy="280" r="120" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.8"/>
    <circle cx="640" cy="280" r="115" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
    
    <!-- Inner Rotating Squares -->
    <g transform="translate(640, 280)">
      <rect x="-60" y="-60" width="120" height="120" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6" transform="rotate(0)"/>
      <rect x="-80" y="-80" width="160" height="160" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.3" transform="rotate(45)"/>
    </g>

    <!-- Android Icon (Simplified) -->
    <g transform="translate(640, 280)">
      <!-- Head -->
      <circle cx="0" cy="-15" r="25" fill="#00d4ff" opacity="0.9"/>
      <!-- Eyes -->
      <circle cx="-10" cy="-20" r="4" fill="#1a1a2e"/>
      <circle cx="10" cy="-20" r="4" fill="#1a1a2e"/>
      <!-- Antenna Left -->
      <line x1="-20" y1="-35" x2="-25" y2="-55" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
      <circle cx="-25" cy="-55" r="5" fill="#00d4ff"/>
      <!-- Antenna Right -->
      <line x1="20" y1="-35" x2="25" y2="-55" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
      <circle cx="25" cy="-55" r="5" fill="#00d4ff"/>
      <!-- Body -->
      <rect x="-20" y="10" width="40" height="35" rx="3" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.9"/>
      <!-- Arms -->
      <line x1="-20" y1="20" x2="-35" y2="20" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
      <line x1="20" y1="20" x2="35" y2="20" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
      <!-- Legs -->
      <line x1="-10" y1="45" x2="-10" y2="60" stroke="#00ff88" stroke-width="3" stroke-linecap="round"/>
      <line x1="10" y1="45" x2="10" y2="60" stroke="#00ff88" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Text: ANDROIDOS-RK -->
  <text x="640" y="430" font-family="Arial, sans-serif" font-size="56" font-weight="bold" text-anchor="middle" fill="#00d4ff" opacity="0.95" letter-spacing="2">
    ANDROIDOS-RK
  </text>

  <!-- Subtitle -->
  <text x="640" y="480" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#00ff88" opacity="0.7" letter-spacing="1">
    Retro Gaming Platform
  </text>

  <!-- Version -->
  <text x="640" y="520" font-family="monospace" font-size="14" text-anchor="middle" fill="#00d4ff" opacity="0.5">
    Version 1.0.0 | R36S
  </text>

  <!-- Loading Bar -->
  <g>
    <!-- Background Bar -->
    <rect x="340" y="560" width="600" height="8" rx="4" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
    <!-- Progress Bar (animated in actual use) -->
    <rect x="340" y="560" width="300" height="8" rx="4" fill="#00d4ff" opacity="0.7">
      <animate attributeName="width" values="0;150;300;450;600" dur="3s" repeatCount="indefinite"/>
    </rect>
    <!-- Glow effect on progress -->
    <rect x="340" y="560" width="300" height="8" rx="4" fill="#00ff88" opacity="0.3">
      <animate attributeName="width" values="0;150;300;450;600" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Loading Text -->
  <text x="640" y="600" font-family="monospace" font-size="12" text-anchor="middle" fill="#00d4ff" opacity="0.7">
    Initializing System...
  </text>

  <!-- Dots Animation -->
  <g opacity="0.6">
    <circle cx="620" cy="603" r="2" fill="#00ff88">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="633" cy="603" r="2" fill="#00ff88">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="646" cy="603" r="2" fill="#00ff88">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="1s"/>
    </circle>
  </g>

  <!-- Corner Accents -->
  <rect x="20" y="20" width="60" height="3" fill="#00d4ff" opacity="0.5"/>
  <rect x="20" y="20" width="3" height="60" fill="#00d4ff" opacity="0.5"/>

  <rect x="1200" y="700" width="60" height="3" fill="#00ff88" opacity="0.5"/>
  <rect x="1257" y="700" width="3" height="60" fill="#00ff88" opacity="0.5"/>
</svg>
