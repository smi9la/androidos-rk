name: androidos_rk
description: "AndriodOS-RK Mobile Controller - Remote management and control for R36S gaming devices"
publish_to: 'none'

environment:
  sdk: '>=2.19.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & Networking
  http: ^1.1.0
  web_socket_channel: ^2.4.0
  
  # State Management
  provider: ^6.0.0
  
  # Bluetooth
  flutter_blue: ^0.8.0
  
  # Storage
  shared_preferences: ^2.1.0
  sqflite: ^2.2.0
  
  # UI
  google_fonts: ^5.1.0
  cached_network_image: ^3.3.0
  
  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  get: ^4.6.5
  
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
